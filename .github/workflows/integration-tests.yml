name: Integration tests (root-gated)

# Runs the `tests/integration/*` suite under the `lab` feature in
# a privileged container. Tests gate themselves with
# `nlink::require_root!()` and `nlink::require_module!(...)` so
# they skip cleanly on developer machines run as a regular user.
# In CI they run for real.
#
# Operational notes (originally from the Plan 140 design):
#   - GHA-default kernel only (no matrix); add a self-hosted
#     runner if a kernel-specific bug surfaces.
#   - --test-threads=1 mandatory (namespace-naming collisions).
#   - apt-get for iproute2 / kmod / conntrack utils; modprobe
#     may fail on read-only /lib/modules — fall back to
#     autoload-on-first-netlink-call.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  integration:
    runs-on: ubuntu-latest
    container:
      # `rust:bookworm` tracks the latest stable Rust on Debian
      # Bookworm. Was previously pinned to `rust:1.85-bookworm`
      # which lagged current stable by ~10 versions and produced
      # spurious warnings (clippy lints against newer std APIs,
      # tool-install churn). The `bookworm` tag floats — accept
      # the occasional CI flakiness when a new Rust release lands
      # in exchange for catching new diagnostics early.
      image: rust:bookworm
      # Container privileges:
      # - `--cap-add=SYS_ADMIN` for unshare(CLONE_NEWNET) and mount(MS_BIND).
      # - `--cap-add=NET_ADMIN` for rtnetlink mutations (link/addr/route/tc).
      # - `--cap-add=NET_RAW` for raw socket operations in some tests.
      # - `--security-opt seccomp=unconfined`: Docker's default seccomp
      #   profile blocks `mount(MS_BIND)` (used by `namespace::create`
      #   to bind-mount the netns file at /var/run/netns/<name>) even
      #   when CAP_SYS_ADMIN is held. Same restriction on `setns()`.
      # - `--security-opt apparmor=unconfined`: Ubuntu hosts layer
      #   apparmor on top of seccomp.
      # - `--volume /lib/modules:/lib/modules:ro`: gives `modprobe`
      #   inside the container access to the host's kernel modules.
      #   Without this, the container's empty /lib/modules means
      #   modprobe can't load HTB / cls_flower / VRF / etc., and
      #   tests that depend on those modules fail with EOPNOTSUPP.
      options: >-
        --cap-add=NET_ADMIN
        --cap-add=SYS_ADMIN
        --cap-add=NET_RAW
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --volume /lib/modules:/lib/modules:ro
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps
        # GHA defaults `run:` steps inside containers to `sh`
        # (which on Debian is dash, not bash). The bash array
        # syntax below requires bash; force it explicitly.
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends iproute2 kmod conntrack

          # Modprobe everything the integration tests can possibly
          # need. Each `|| true` keeps the workflow going if a
          # specific module is missing on the host kernel — the
          # affected test then skips via `require_module!()`.
          # /lib/modules is mounted read-only from the host (see
          # container options above), so modprobe loads against the
          # actual host kernel.
          modules=(
            # netfilter (conntrack mutation + multicast events)
            nf_conntrack
            nf_conntrack_netlink
            # tc qdiscs
            sch_htb sch_netem sch_tbf sch_sfq sch_prio
            sch_fq_codel sch_ingress sch_clsact sch_drr sch_qfq
            sch_hfsc sch_red sch_pie sch_cake
            # tc classifiers
            cls_flower cls_u32 cls_matchall cls_basic cls_fw
            cls_route cls_bpf cls_cgroup
            # tc actions
            act_gact act_mirred act_police act_vlan act_skbedit
            act_csum act_nat act_pedit act_bpf act_ct
            # link types
            dummy veth bridge bonding ifb vrf
            macvlan ipvlan vlan vxlan geneve gre gretap
            ip6_gre ipip sit
            # xfrm (IPsec)
            xfrm_user xfrm4_tunnel xfrm6_tunnel
            # macsec (GENL family)
            macsec
          )
          for m in "${modules[@]}"; do
            modprobe "$m" 2>/dev/null && echo "loaded: $m" || echo "skip: $m (not available; tests will skip via require_module!)"
          done

      - name: Build with `lab` feature
        run: cargo build -p nlink --features lab --tests

      - name: Run integration tests as root
        env:
          CARGO_TERM_COLOR: always
        run: |
          # --test-threads=1 is mandatory: tests create
          # `nlink-lab-*` namespaces and the unique-name suffix
          # prevents collisions, but parallel execution of the
          # heavier recipes (HTB trees, xfrm SAs) still races on
          # shared kernel state in some kernels.
          cargo test -p nlink --features lab --test integration -- \
              --test-threads=1 --nocapture

      - name: Run library unit tests too
        # One CI job, one quality gate — keep the unit suite here
        # so a kernel-version mismatch surfaces at the same place
        # as integration failures.
        run: cargo test -p nlink --lib

      - name: Install clippy component
        # The `rust:bookworm` image ships with rustup + a default
        # toolchain but no extra components. Earlier `rust:1.85-bookworm`
        # behaviour worked by accident; the floating tag doesn't.
        # rustfmt is also missing from the default install, but we
        # don't run it in CI yet.
        run: rustup component add clippy

      - name: Workspace clippy
        run: cargo clippy --workspace --all-targets --all-features -- --deny warnings

      - name: cargo machete
        # `bins/{ss,bridge}` pre-existing dead deps were cleaned up
        # in 0.15.1 (Plan 144 Phase 4), so machete now runs without
        # `|| true` suppression.
        run: |
          cargo install cargo-machete --locked
          cargo machete
