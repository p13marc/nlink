name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

# Per Plan 144 (0.15.1 CI safety nets), the prior single-step
# `cargo test --verbose` job is split into named, parallel-able
# checks. Each gate has a clear "what failed" signal in the
# GitHub UI.
#
# Toolchain: every Rust-using job pins `dtolnay/rust-toolchain@stable`
# explicitly. Without this, jobs use whatever Rust ubuntu-latest
# ships pre-installed, which lags current stable by months and
# produces compiler/clippy warnings against deprecated APIs and
# missing-lint diagnostics. `Swatinem/rust-cache@v2` caches the
# cargo registry + target/ between runs to keep CI fast.
jobs:

  # Catches the 0.15.0-class regression where an example imports a
  # feature-gated module without declaring `required-features`. With
  # default features only, every example still has to compile.
  build-and-test-default-features:
    name: build + test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (default features, all targets)
        run: cargo build --workspace --all-targets
      - name: Test (default features)
        run: cargo test --workspace

  # Catches issues that only manifest when optional features are on
  # (cfg-gated code paths, feature-flag wiring bugs).
  build-and-test-all-features:
    name: build + test (--all-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (--all-features, all targets)
        run: cargo build --workspace --all-targets --all-features
      - name: Test (--all-features)
        run: cargo test --workspace --all-features

  clippy:
    name: clippy --deny warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- --deny warnings

  # rustdoc-side enforcement: broken intra-doc links fail the build.
  # Matches the docs.rs build (--all-features per
  # crates/nlink/Cargo.toml [package.metadata.docs.rs]).
  doc:
    name: cargo doc (deny broken intra-doc links)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links -D rustdoc::redundant_explicit_links"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc -p nlink --no-deps --all-features

  # Catches accidental SemVer violations against the latest published
  # version on crates.io. Per obi1kenobi research, ~1 in 6 crates
  # accidentally violates semver. This is the cheapest 1.0-prep step.
  # The action handles its own toolchain pinning internally.
  semver-checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: nlink

  # Diff the public API surface against the previous git tag. For
  # patch releases, the diff MUST be empty. For minor releases, the
  # diff is informational; the gate catches *unintended* changes,
  # not all changes.
  public-api-diff:
    name: cargo public-api diff vs last tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git tag lookup
      # cargo-public-api needs nightly to invoke `cargo +nightly
      # rustdoc --output-format json` (the JSON output it diffs
      # against). Stable is also needed to build cargo-public-api
      # itself. Install both; nightly is just available, stable
      # remains the default for `cargo install`.
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly
      - run: rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-public-api
        run: cargo install --locked cargo-public-api
      - name: Diff public API vs latest tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -z "$LATEST_TAG" ]]; then
            echo "No git tag found; skipping public-api diff (first release?)"
            exit 0
          fi
          echo "Diffing public API: $LATEST_TAG..HEAD"
          # Informational only: prints added / removed / changed items
          # so reviewers see the diff in the PR run, but doesn't fail
          # the build. The strict gate is `cargo-semver-checks` (above),
          # which catches accidental breakage. Adding new pub items —
          # legitimate for minor releases — should not fail PR CI.
          cargo public-api -p nlink diff "$LATEST_TAG..HEAD"

  # Audit script: every [[example]] entry must declare
  # `required-features` for any feature-gated module it imports
  # (lab, sockdiag, tuntap, output, namespace_watcher).
  # Pure bash; no toolchain step needed.
  audit-examples:
    name: audit example feature gating
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/audit-example-features.sh
        run: bash scripts/audit-example-features.sh

  # Audit script: every `.rs` file under crates/nlink/examples/
  # MUST be registered as a [[example]] entry in Cargo.toml.
  # Closes the gap surfaced by Plan 160: cargo doesn't auto-
  # discover examples in subdirectories, so unregistered files
  # bit-rot silently against API changes. Known orphans are
  # exempted via scripts/audit-example-registration.allowlist
  # (catalogued in plans/160-example-registry-audit.md);
  # NEW unregistered files fail this job. Pure bash; ~3s.
  audit-example-registration:
    name: audit example registration (every .rs in examples/ visible to cargo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/audit-example-registration.sh
        run: bash scripts/audit-example-registration.sh

  # Plan 193 §2.3 — parser robustness. Event parsers walking
  # MessageIter::new(data) must silently skip malformed frames
  # (per CLAUDE.md §"Parser robustness" §3) rather than aborting
  # the whole batch via `?`. Future parser additions inherit
  # this contract from the CI gate.
  audit-recv-loop-error-handling:
    name: audit recv-loop error handling (per-message skip in event parsers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/audit-recv-loop-error-handling.sh
        run: bash scripts/audit-recv-loop-error-handling.sh

  # Plan 192 §2.7 — namespace-safety. Library code must not
  # read /sys/class/net/ or /proc/sys/ from the calling
  # process's mount namespace (the wrong one when called from
  # a thread bound to a foreign netns). sysctl.rs is the
  # documented exception. New violations either need to be
  # added to ALLOWED in the script with a rationale or
  # replaced with a netlink-based path.
  audit-sysfs-in-lib:
    name: audit sysfs/procfs reads outside ALLOWED files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/audit-sysfs-in-lib.sh
        run: bash scripts/audit-sysfs-in-lib.sh

  # Plan 223 — endianness drift. NLA headers (struct nlattr) and
  # the kernel's attribute payloads are native-endian. The 0.19 N3
  # fix swept `from_le_bytes` out of xfrm.rs; 0.20 cycled the
  # remaining sites (netfilter / action / nftables diff). This
  # script keeps the class closed: any new `from_le_bytes` in
  # crates/nlink/src/netlink/ fails the build unless it's in the
  # ALLOWED list (currently empty).
  audit-bytes-le:
    name: audit from_le_bytes (NLA / TLV native-endian policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/audit-bytes-le.sh
        run: bash scripts/audit-bytes-le.sh

  # Plan 223 — big-endian compile gate. nlink targets Linux on any
  # endian; the lib must compile clean for s390x as a structural
  # guard against future width / alignment / endianness drift.
  # Compile-only — no tests are run (no BE hardware in CI).
  big-endian-check:
    name: cargo check (s390x, BE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: s390x-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install s390x cross-linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-s390x-linux-gnu
      - name: Configure cross-linker
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.s390x-unknown-linux-gnu]
          linker = "s390x-linux-gnu-gcc"
          EOF
      - name: cargo check --target s390x-unknown-linux-gnu
        run: cargo check --target s390x-unknown-linux-gnu -p nlink

  # Audit script: every `#[ignore]` in
  # `crates/nlink/tests/integration/` MUST be catalogued in
  # `crates/nlink/tests/integration/IGNORED.md`. Closes the gap
  # surfaced by Plan 174: `#[ignore]` accumulates silently
  # otherwise. New ignores either need a row in the catalog (with
  # a reason + tracking plan) or to be replaced with
  # `nlink::require_root!()` so they run for real in privileged
  # CI instead of being permanently dead.
  audit-ignored-tests:
    name: audit ignored tests (every #[ignore] catalogued in IGNORED.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts/audit-ignored-tests.sh
        run: bash scripts/audit-ignored-tests.sh

  # No more `|| true` suppression. Plan 144 cleaned up the
  # pre-existing dead deps in bins/{ss,bridge}; if a NEW unused
  # dep lands, fail loudly so the contributor cleans up before merge.
  machete:
    name: cargo machete (no unused deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install --locked cargo-machete
      - name: Run cargo machete
        run: cargo machete

  # Verifies the declared `rust-version` in Cargo.toml actually
  # builds. cargo-msrv downloads the MSRV toolchain (currently
  # 1.95) on its own; the runner toolchain just needs to be
  # modern enough to build cargo-msrv itself. When stable
  # advances, bump the workspace `rust-version` in lockstep.
  msrv:
    name: cargo-msrv verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-msrv
        run: cargo install --locked cargo-msrv
      - name: Verify MSRV
        run: cargo msrv verify --path crates/nlink
